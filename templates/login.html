{% extends 'base.html' %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Welcome back 👋</div>
    <p class="auth-sub">Log in to your JobPortal account</p>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" placeholder="your_username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem;">
        Log In →
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Sign up free</a>
    </div>
  </div>
</div>
{% endblock %}
