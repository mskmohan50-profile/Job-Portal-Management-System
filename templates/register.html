{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Create Account ✨</div>
    <p class="auth-sub">Join thousands finding their dream jobs</p>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" placeholder="cool_username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="Min. 8 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">I am a…</label>
        <div class="role-grid">
          <div>
            <input type="radio" name="role" id="role_seeker" value="seeker" class="role-option" checked>
            <label for="role_seeker" class="role-label">
              <span class="role-icon">🧑‍💼</span>
              <span class="role-name">Job Seeker</span>
            </label>
          </div>
          <div>
            <input type="radio" name="role" id="role_employer" value="employer" class="role-option">
            <label for="role_employer" class="role-label">
              <span class="role-icon">🏢</span>
              <span class="role-name">Employer</span>
            </label>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        Create Account →
      </button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
